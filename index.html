<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Метафорические карты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen-home" class="screen active">
    <h1>Метафорические карты</h1>
    <p class="hint">Сформулируйте вопрос и выберите расклад</p>
    <button class="btn" data-spread="1">🎴 Одна карта</button>
    <button class="btn" data-spread="3">🔮 Три карты: прошлое — настоящее — будущее</button>
  </div>

  <div id="screen-cards" class="screen">
    <div id="cards-container"></div>
    <button class="btn btn-secondary" id="btn-back">← Вернуться</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
